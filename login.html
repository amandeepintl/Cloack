<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Colack</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&amp;family=Sora:wght@600;700&amp;family=IBM+Plex+Sans:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "on-error": "#ffffff",
                            "outline": "#717970",
                            "primary-container": "#14532d",
                            "tertiary": "#591d28",
                            "surface": "#FFFFFF",
                            "error-container": "#ffdad6",
                            "on-tertiary-fixed": "#3c0613",
                            "surface-container-highest": "#e5e2e1",
                            "secondary-fixed": "#ffdcc3",
                            "surface-variant": "#e5e2e1",
                            "on-secondary-fixed": "#2f1500",
                            "surface-tint": "#2e6a41",
                            "tertiary-fixed-dim": "#ffb2bb",
                            "secondary": "#904d00",
                            "surface-container": "#f0edec",
                            "border-subtle": "#E6E6E2",
                            "text-secondary": "#666666",
                            "tertiary-fixed": "#ffd9dc",
                            "inverse-surface": "#313030",
                            "on-surface-variant": "#404941",
                            "on-tertiary-container": "#f79eaa",
                            "surface-container-lowest": "#ffffff",
                            "on-background": "#1c1b1b",
                            "on-primary-fixed": "#00210d",
                            "on-secondary": "#ffffff",
                            "on-tertiary-fixed-variant": "#73323d",
                            "on-secondary-container": "#663500",
                            "success": "#16A34A",
                            "secondary-container": "#fe932c",
                            "on-primary-container": "#87c695",
                            "background": "#F8F8F6",
                            "secondary-fixed-dim": "#ffb77d",
                            "on-surface": "#1c1b1b",
                            "surface-container-high": "#eae7e7",
                            "on-primary-fixed-variant": "#12512c",
                            "inverse-on-surface": "#f3f0ef",
                            "error": "#DC2626",
                            "primary-fixed": "#b1f2be",
                            "outline-variant": "#c0c9be",
                            "tertiary-container": "#75333e",
                            "on-tertiary": "#ffffff",
                            "on-error-container": "#93000a",
                            "inverse-primary": "#96d5a3",
                            "surface-secondary": "#F2F2EF",
                            "primary-fixed-dim": "#96d5a3",
                            "surface-dim": "#dcd9d9",
                            "surface-bright": "#fcf9f8",
                            "primary": "#003b1b",
                            "on-secondary-fixed-variant": "#6e3900",
                            "on-primary": "#ffffff",
                            "surface-container-low": "#f6f3f2",
                            "primary-hover": "#166534"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "gutter": "24px",
                            "unit": "4px",
                            "stack-sm": "8px",
                            "container-max": "1280px",
                            "margin-mobile": "16px",
                            "margin-desktop": "48px",
                            "stack-lg": "32px",
                            "stack-md": "16px",
                            "section-gap": "80px"
                        },
                        "fontFamily": {
                            "body-sm": ["Plus Jakarta Sans"],
                            "headline-lg-mobile": ["Sora"],
                            "price-display": ["IBM Plex Sans"],
                            "headline-md": ["Sora"],
                            "display": ["Sora"],
                            "label-caps": ["IBM Plex Sans"],
                            "headline-lg": ["Sora"],
                            "body-md": ["Plus Jakarta Sans"],
                            "body-lg": ["Plus Jakarta Sans"]
                        },
                        "fontSize": {
                            "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                            "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                            "price-display": ["20px", { "lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                            "display": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                            "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                            "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 md:p-12">

    <main class="w-full max-w-[460px] flex flex-col items-center">
        <!-- Logo Section -->
        <div class="mb-8">
            <a href="./index.html">
                <img alt="Colack Logo" class="h-10 w-auto" src="https://lh3.googleusercontent.com/aida/AP1WRLuoGNouXqg7NYxuaBd8niLEEGIquvz5cQqIP-vy5t-9mcWjBZgUv6PHAs5Dfk7yyR79PAe5jqU2gZvNt_wCZmOvFXvOFTd3ac8ZtU_3wMhrUDfwBHSMG3ZwWw-QdBz9Ly_XT0llN-W99vXQKy15yjpyHWS8WIVCu_70Y899_ewC5CDhRaNHgeRsAcCIIO6ytrL_rbcxx69YqR7lTtQ-W2IPlrCiLlsgi6EkHkfp4dvOMigpsgvs5Rb7MgtG">
            </a>
        </div>

        <!-- Login Card -->
        <section class="bg-surface w-full rounded-xl p-8 border border-border-subtle shadow-lg flex flex-col gap-6">
            <div class="space-y-1">
                <h1 class="font-headline-md text-headline-md text-on-surface tracking-tight" id="login-title">Welcome back</h1>
                <p class="font-body-sm text-body-sm text-text-secondary" id="login-subtitle">Choose your preferred login method to proceed.</p>
            </div>

            <!-- Tab Switcher -->
            <div class="flex border-b border-border-subtle">
                <button id="tab-password" class="flex-1 pb-3 text-body-sm font-semibold border-b-2 border-primary text-primary transition-all">Credentials</button>
                <button id="tab-passwordless" class="flex-1 pb-3 text-body-sm font-medium border-b-2 border-transparent text-text-secondary hover:text-primary transition-all">Email Link</button>
            </div>

            <!-- Tab 1: Email & Password Form -->
            <form id="password-form" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label for="email" class="font-body-sm text-body-sm text-text-secondary">Email address</label>
                    <input type="email" id="email" required placeholder="name@company.com" class="w-full h-12 px-4 rounded-lg border border-border-subtle bg-surface-container-lowest font-body-md text-body-md focus:ring-primary focus:border-primary">
                </div>

                <div class="flex flex-col gap-1 relative">
                    <div class="flex justify-between items-center">
                        <label for="password" class="font-body-sm text-body-sm text-text-secondary">Password</label>
                        <a href="./forgot-password.html" class="font-body-sm text-body-sm text-primary hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" class="w-full h-12 px-4 rounded-lg border border-border-subtle bg-surface-container-lowest font-body-md text-body-md focus:ring-primary focus:border-primary pr-10">
                        <button type="button" id="toggle-pw-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface">
                            <span class="material-symbols-outlined text-lg" id="pw-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-password-btn" class="w-full h-12 bg-primary text-on-primary font-body-md font-semibold rounded-lg hover:bg-primary-hover active:scale-[0.98] transition-all flex items-center justify-center">
                    Sign In with Password
                </button>
            </form>

            <!-- Tab 2: Email Link Form (Hidden by default) -->
            <form id="passwordless-form" class="hidden flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label for="link-email" class="font-body-sm text-body-sm text-text-secondary">Email address</label>
                    <input type="email" id="link-email" required placeholder="name@company.com" class="w-full h-12 px-4 rounded-lg border border-border-subtle bg-surface-container-lowest font-body-md text-body-md focus:ring-primary focus:border-primary">
                </div>

                <button type="submit" id="submit-link-btn" class="w-full h-12 bg-primary text-on-primary font-body-md font-semibold rounded-lg hover:bg-primary-hover active:scale-[0.98] transition-all flex items-center justify-center">
                    Send Magic Link
                </button>

                <div id="link-success-state" class="hidden p-4 rounded-lg bg-primary-fixed/30 border border-primary-fixed text-primary text-body-sm text-center flex flex-col gap-3">
                    <p class="font-semibold">✨ Magic link sent to your inbox!</p>
                    <p class="text-xs">Since you are developing locally, click the simulation button below to bypass actual email verification:</p>
                    <button type="button" id="simulate-link-btn" class="py-2 px-4 bg-primary text-on-primary rounded font-semibold text-xs hover:bg-primary-hover active:scale-95 transition-all">Simulate Link Landing</button>
                </div>
            </form>

            <!-- Divider -->
            <div class="relative flex items-center py-1">
                <div class="flex-grow border-t border-border-subtle"></div>
                <span class="flex-shrink mx-4 font-body-sm text-body-sm text-text-secondary">or continue with</span>
                <div class="flex-grow border-t border-border-subtle"></div>
            </div>

            <!-- Social & Guest Logins -->
            <div class="flex flex-col gap-3">
                <button type="button" id="google-login-btn" class="w-full flex items-center justify-center gap-3 h-12 border border-border-subtle rounded-lg font-body-sm font-semibold hover:bg-surface-secondary active:scale-[0.98] transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                        <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"></path>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
                    </svg>
                    Sign In with Google
                </button>
                
                <button type="button" id="anonymous-login-btn" class="w-full flex items-center justify-center gap-3 h-12 border border-border-subtle rounded-lg font-body-sm font-semibold hover:bg-surface-secondary active:scale-[0.98] transition-all text-on-surface">
                    <span class="material-symbols-outlined text-[20px] text-text-secondary">no_accounts</span>
                    Continue as Guest Anonymously
                </button>
            </div>
        </section>

        <!-- Footer Link -->
        <p class="mt-8 font-body-sm text-body-sm text-text-secondary">
            Don't have an account? <a href="./signup.html" class="text-primary font-semibold hover:underline">Sign up</a>
        </p>
    </main>

    <!-- Firebase Integration Logic -->
    <script type="module">
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            sendSignInLinkToEmail, 
            isSignInWithEmailLink, 
            signInWithEmailLink, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signInAnonymously 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        import { app, auth } from "./firebase-config.js";
        import { showToast } from "./brand.js";

        // Tab Switching
        const tabPassword = document.getElementById('tab-password');
        const tabPasswordless = document.getElementById('tab-passwordless');
        const passwordForm = document.getElementById('password-form');
        const passwordlessForm = document.getElementById('passwordless-form');
        const loginTitle = document.getElementById('login-title');
        const loginSubtitle = document.getElementById('login-subtitle');

        tabPassword.onclick = () => {
            tabPassword.className = "flex-1 pb-3 text-body-sm font-semibold border-b-2 border-primary text-primary transition-all";
            tabPasswordless.className = "flex-1 pb-3 text-body-sm font-medium border-b-2 border-transparent text-text-secondary hover:text-primary transition-all";
            passwordForm.classList.remove('hidden');
            passwordlessForm.classList.add('hidden');
            loginTitle.textContent = "Welcome back";
            loginSubtitle.textContent = "Enter your credentials to access your workspace.";
        };

        tabPasswordless.onclick = () => {
            tabPasswordless.className = "flex-1 pb-3 text-body-sm font-semibold border-b-2 border-primary text-primary transition-all";
            tabPassword.className = "flex-1 pb-3 text-body-sm font-medium border-b-2 border-transparent text-text-secondary hover:text-primary transition-all";
            passwordlessForm.classList.remove('hidden');
            passwordForm.classList.add('hidden');
            loginTitle.textContent = "Passwordless Sign In";
            loginSubtitle.textContent = "Enter your email, and we will send you an authentication magic link.";
        };

        // Show/Hide Password Toggle
        const togglePwBtn = document.getElementById('toggle-pw-btn');
        const passwordInput = document.getElementById('password');
        const pwIcon = document.getElementById('pw-icon');
        
        togglePwBtn.onclick = () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                pwIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                pwIcon.textContent = 'visibility';
            }
        };

        // 1. Email & Password Login handler
        passwordForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const submitBtn = document.getElementById('submit-password-btn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Signing In...';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                showToast(`Successfully logged in as ${userCredential.user.email}`);
                handlePostAuthRedirect();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In with Password';
            }
        };

        // 2. Email Link (Passwordless) Login handler
        passwordlessForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('link-email').value;
            const submitBtn = document.getElementById('submit-link-btn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Sending magic link...';

            const actionCodeSettings = {
                // Must redirect back to the login page itself to complete sign-in
                url: window.location.origin + window.location.pathname,
                handleCodeInApp: true
            };

            // Warning for file:// origin
            if (window.location.protocol === 'file:') {
                showToast("Real Email Link auth requires http/https. Activating simulated fallback...", "warning");
                submitBtn.classList.add('hidden');
                document.getElementById('link-success-state').classList.remove('hidden');
                
                // Store email in localStorage for local testing
                window.localStorage.setItem('emailForSignIn', email);
                return;
            }

            try {
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                submitBtn.classList.add('hidden');
                document.getElementById('link-success-state').classList.remove('hidden');
                showToast("Magic link sent successfully!");
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Magic Link';
            }
        };

        // Simulate local link click fallback
        document.getElementById('simulate-link-btn').onclick = () => {
            const email = window.localStorage.getItem('emailForSignIn');
            // Mock an incoming link redirect
            const simulatedUrl = window.location.origin + window.location.pathname + '?apiKey=' + auth.config.apiKey + '&oobCode=simulated_code';
            window.location.href = simulatedUrl;
        };

        // 3. Google Sign-In handler
        document.getElementById('google-login-btn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`Signed in successfully as ${result.user.displayName || result.user.email}`);
                handlePostAuthRedirect();
            } catch (error) {
                console.error(error);
                showToast("Google Sign-In failed: " + error.message, "error");
            }
        };

        // 4. Anonymous Guest login handler
        document.getElementById('anonymous-login-btn').onclick = async () => {
            try {
                const result = await signInAnonymously(auth);
                showToast("Browsing anonymously as Guest.");
                handlePostAuthRedirect();
            } catch (error) {
                console.error(error);
                showToast("Guest Login failed: " + error.message, "error");
            }
        };

        // Redirect helper
        function handlePostAuthRedirect() {
            const target = sessionStorage.getItem('redirect_after_auth') || 'index.html';
            sessionStorage.removeItem('redirect_after_auth');
            setTimeout(() => {
                window.location.href = `./${target}`;
            }, 1000);
        }

        // On Page Load: Check if landing from a Magic Link click
        async function checkIncomingMagicLink() {
            if (isSignInWithEmailLink(auth, window.location.href)) {
                let email = window.localStorage.getItem('emailForSignIn');
                
                // If email isn't in local storage, prompt user
                if (!email) {
                    email = window.prompt('Please enter your email to confirm sign-in:');
                }

                if (email) {
                    showToast("🔒 Verifying magic link security...", "info");
                    try {
                        await signInWithEmailLink(auth, email, window.location.href);
                        window.localStorage.removeItem('emailForSignIn');
                        showToast("Authentication successful! Welcome to Colack.");
                        handlePostAuthRedirect();
                    } catch (error) {
                        console.error(error);
                        showToast("Failed to verify magic link: " + error.message, "error");
                    }
                }
            } else if (window.location.search.includes('oobCode=simulated_code')) {
                // Handle Simulated Magic Link
                showToast("🔒 Verifying simulated magic link...", "info");
                setTimeout(async () => {
                    try {
                        const email = window.localStorage.getItem('emailForSignIn') || 'simulated.user@colack.com';
                        // Log in anonymously or mock sign-in
                        await signInAnonymously(auth);
                        window.localStorage.removeItem('emailForSignIn');
                        showToast(`Simulated sign-in successful as ${email}!`);
                        handlePostAuthRedirect();
                    } catch (err) {
                        showToast("Simulation failed: " + err.message, "error");
                    }
                }, 1000);
            }
        }

        checkIncomingMagicLink();
    </script>
</body>
</html>
