<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Colack</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500&amp;family=IBM+Plex+Sans:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "on-tertiary": "#ffffff",
                            "outline": "#717970",
                            "surface-container-highest": "#e5e2e1",
                            "border-subtle": "#E6E6E2",
                            "surface-dim": "#dcd9d9",
                            "inverse-surface": "#313030",
                            "primary": "#003b1b",
                            "secondary": "#904d00",
                            "on-error-container": "#93000a",
                            "primary-fixed-dim": "#96d5a3",
                            "on-secondary-container": "#663500",
                            "surface-container": "#f0edec",
                            "primary-fixed": "#b1f2be",
                            "on-secondary": "#ffffff",
                            "error": "#DC2626",
                            "inverse-on-surface": "#f3f0ef",
                            "tertiary-fixed-dim": "#ffb2bb",
                            "on-secondary-fixed": "#2f1500",
                            "outline-variant": "#c0c9be",
                            "surface-bright": "#fcf9f8",
                            "surface": "#FFFFFF",
                            "secondary-container": "#fe932c",
                            "surface-container-high": "#eae7e7",
                            "tertiary-container": "#75333e",
                            "surface-container-low": "#f6f3f2",
                            "on-tertiary-container": "#f79eaa",
                            "tertiary-fixed": "#ffd9dc",
                            "on-primary-fixed-variant": "#12512c",
                            "primary-hover": "#166534",
                            "surface-secondary": "#F2F2EF",
                            "surface-tint": "#2e6a41",
                            "tertiary": "#591d28",
                            "success": "#16A34A",
                            "text-secondary": "#666666",
                            "on-surface-variant": "#404941",
                            "primary-container": "#14532d",
                            "on-tertiary-fixed-variant": "#73323d",
                            "surface-container-lowest": "#ffffff",
                            "secondary-fixed-dim": "#ffb77d",
                            "on-tertiary-fixed": "#3c0613",
                            "on-secondary-fixed-variant": "#6e3900",
                            "on-background": "#1c1b1b",
                            "surface-variant": "#e5e2e1",
                            "inverse-primary": "#96d5a3",
                            "on-primary-container": "#87c695",
                            "on-error": "#ffffff",
                            "on-surface": "#1c1b1b",
                            "on-primary": "#ffffff",
                            "secondary-fixed": "#ffdcc3",
                            "error-container": "#ffdad6",
                            "background": "#F8F8F6",
                            "on-primary-fixed": "#00210d"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "stack-lg": "32px",
                            "container-max": "1280px",
                            "margin-desktop": "48px",
                            "stack-sm": "8px",
                            "margin-mobile": "16px",
                            "section-gap": "80px",
                            "unit": "4px",
                            "stack-md": "16px",
                            "gutter": "24px"
                        },
                        "fontFamily": {
                            "headline-lg-mobile": ["Sora"],
                            "price-display": ["IBM Plex Sans"],
                            "label-caps": ["IBM Plex Sans"],
                            "body-md": ["Plus Jakarta Sans"],
                            "body-lg": ["Plus Jakarta Sans"],
                            "display": ["Sora"],
                            "headline-md": ["Sora"],
                            "body-sm": ["Plus Jakarta Sans"],
                            "headline-lg": ["Sora"]

                        "fontSize": {
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "price-display": ["20px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                            "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                            "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    </script>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md antialiased min-h-screen">

    <!-- TopNavBar -->
    <header class="bg-surface sticky top-0 z-50 border-b border-border-subtle h-20">
        <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop flex justify-between items-center h-full">
            <div class="flex items-center gap-stack-md">
                <a href="./index.html" class="font-display text-headline-md tracking-tight text-primary"><img src="https://lh3.googleusercontent.com/aida/AP1WRLuoGNouXqg7NYxuaBd8niLEEGIquvz5cQqIP-vy5t-9mcWjBZgUv6PHAs5Dfk7yyR79PAe5jqU2gZvNt_wCZmOvFXvOFTd3ac8ZtU_3wMhrUDfwBHSMG3ZwWw-QdBz9Ly_XT0llN-W99vXQKy15yjpyHWS8WIVCu_70Y899_ewC5CDhRaNHgeRsAcCIIO6ytrL_rbcxx69YqR7lTtQ-W2IPlrCiLlsgi6EkHkfp4dvOMigpsgvs5Rb7MgtG" alt="Colack Logo" class="h-8 w-auto object-contain"></a>
            </div>
            <div class="flex items-center gap-stack-lg">
                <div class="flex items-center gap-unit text-text-secondary">
                    <span class="material-symbols-outlined text-[20px]">lock</span>
                    <span class="font-label-caps text-label-caps uppercase tracking-widest font-bold">Secure Checkout</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12 md:py-section-gap">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter items-start">
            
            <!-- Left Column: Information Gathering -->
            <div class="lg:col-span-7 space-y-10">
                <!-- Shipping Information -->
                <section id="shipping-section" class="bg-surface p-6 md:p-8 rounded-xl border border-border-subtle">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 rounded-full bg-surface-secondary flex items-center justify-center font-bold text-primary">1</span>
                            <h2 class="font-headline-md text-headline-md text-primary">Shipping Information</h2>
                        </div>
                    </div>
                    <form class="space-y-4" id="shipping-form">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">First Name</label>
                                <input type="text" id="fname" placeholder="John" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">Last Name</label>
                                <input type="text" id="lname" placeholder="Doe" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="font-body-sm text-body-sm text-text-secondary">Email Address</label>
                            <input type="email" id="email" placeholder="john.doe@example.com" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                        </div>
                        <div class="space-y-1">
                            <label class="font-body-sm text-body-sm text-text-secondary">Address</label>
                            <input type="text" id="address" placeholder="123 Gallery Street" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">City</label>
                                <input type="text" id="city" placeholder="New York" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">State</label>
                                <input type="text" id="state" placeholder="NY" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">Zip Code</label>
                                <input type="text" id="zip" placeholder="10001" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                        </div>
                    </form>
                </section>

                <!-- Payment Method -->
                <section id="payment-section" class="bg-surface p-6 md:p-8 rounded-xl border border-border-subtle">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 rounded-full bg-surface-secondary flex items-center justify-center font-bold text-primary">2</span>
                            <h2 class="font-headline-md text-headline-md text-primary">Payment Method</h2>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex gap-4 mb-6">
                            <button class="flex-1 py-4 px-6 border-2 border-primary bg-surface-container-low rounded-lg flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
                                <span class="font-body-md font-semibold text-primary">Credit Card</span>
                            </button>
                        </div>
                        <div class="space-y-4 p-6 bg-surface-container-lowest rounded-lg border border-border-subtle">
                            <div class="space-y-1">
                                <label class="font-body-sm text-body-sm text-text-secondary">Card Number</label>
                                <input type="text" id="card-num" placeholder="0000 0000 0000 0000" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="font-body-sm text-body-sm text-text-secondary">Expiration Date</label>
                                    <input type="text" id="card-exp" placeholder="MM / YY" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                                </div>
                                <div class="space-y-1">
                                    <label class="font-body-sm text-body-sm text-text-secondary">CVV</label>
                                    <input type="password" id="card-cvv" placeholder="***" required class="w-full px-4 py-3 border border-border-subtle rounded-lg bg-surface focus:ring-primary focus:border-primary">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Order Review -->
            <div class="lg:col-span-5 lg:sticky lg:top-28">
                <section class="bg-surface p-6 md:p-8 rounded-xl border border-border-subtle">
                    <h2 class="font-headline-md text-headline-md text-primary mb-8">Order Review</h2>
                    
                    <!-- Item List -->
                    <div class="space-y-4 mb-8 max-h-[320px] overflow-y-auto pr-2" id="checkout-items">
                        <!-- Items rendered by JS -->
                    </div>
                    
                    <!-- Price Summary -->
                    <div class="space-y-3 mb-8" id="checkout-totals">
                        <!-- Totals rendered by JS -->
                    </div>
                    
                    <!-- Actions -->
                    <div class="space-y-4">
                        <button id="complete-order-btn" class="w-full py-4 bg-primary text-on-primary font-body-lg font-semibold rounded-lg hover:bg-primary-hover active:scale-[0.98] transition-all flex items-center justify-center gap-2 font-bold shadow-lg shadow-primary/10">
                            <span class="material-symbols-outlined">lock_person</span>
                            COMPLETE SECURE ORDER
                        </button>
                        <button id="auto-checkout-btn" type="button" class="w-full py-3 bg-surface-secondary text-primary border border-primary/20 hover:border-primary/50 hover:bg-primary/5 font-body-md font-semibold rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 font-bold">
                            <span class="material-symbols-outlined text-[20px]">flash_on</span>
                            ⚡ FAST AUTO-CHECKOUT (TEST)
                        </button>
                    </div>
                    
                    <!-- Trust Badge -->
                    <div class="mt-10 pt-8 border-t border-border-subtle flex flex-col items-center gap-2">
                        <div class="flex items-center gap-1 text-success">
                            <span class="material-symbols-outlined text-[18px]">verified_user</span>
                            <span class="font-label-caps text-label-caps uppercase font-bold">100% Encrypted &amp; Secure</span>
                        </div>
                        <p class="font-body-sm text-[11px] text-text-secondary text-center">Your transaction is protected by 256-bit SSL encryption.</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Dynamic Header and State Route Guards -->
    <script type="module" src="./brand.js"></script>

    <!-- Checkout Hydrator & Simulation -->
    <script type="module">
        import { cart, showToast } from './brand.js';

        const itemsContainer = document.getElementById('checkout-items');
        const totalsContainer = document.getElementById('checkout-totals');
        const completeBtn = document.getElementById('complete-order-btn');

        function initCheckout() {
            const items = cart.get();
            if (items.length === 0) {
                showToast("Your cart is empty. Redirecting to shop...", "warning");
                setTimeout(() => {
                    window.location.href = './shop.html';
                }, 1500);
                return;
            }

            // Hydrate Items
            itemsContainer.innerHTML = '';
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-4 pb-4 border-b border-border-subtle';
                
                row.innerHTML = `
                    <div class="w-16 h-16 bg-surface-secondary rounded overflow-hidden flex-shrink-0">
                        <img class="w-full h-full object-cover" src="${item.img}" alt="${item.name}">
                    </div>
                    <div class="flex-grow">
                        <p class="font-body-md font-semibold text-on-surface truncate">${item.name}</p>
                        <p class="text-[12px] text-text-secondary">${item.category.toUpperCase()} / WORKFLOW</p>
                        <div class="flex justify-between items-end mt-1">
                            <span class="text-body-sm text-text-secondary">Qty: ${item.quantity}</span>
                            <span class="font-price-display text-body-md text-primary font-bold">${new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(item.price * item.quantity)}</span>
                        </div>
                    </div>
                `;
                itemsContainer.appendChild(row);
            });

            // Hydrate Totals
            const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            const total = subtotal + tax;

            totalsContainer.innerHTML = `
                <div class="flex justify-between text-body-md text-text-secondary">
                    <span>Subtotal</span>
                    <span>${new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(subtotal)}</span>
                </div>
                <div class="flex justify-between text-body-md text-text-secondary">
                    <span>Shipping</span>
                    <span class="text-success font-semibold">Free Express</span>
                </div>
                <div class="flex justify-between text-body-md text-text-secondary">
                    <span>Taxes (8%)</span>
                    <span>${new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(tax)}</span>
                </div>
                <div class="pt-4 mt-2 border-t border-border-subtle flex justify-between items-baseline">
                    <span class="font-headline-md text-headline-md font-bold text-on-surface">Total</span>
                    <span class="font-price-display text-[24px] text-primary font-bold">${new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(total)}</span>
                </div>
            `;
        }

        // Simulate secure checkout completion
        completeBtn.onclick = () => {
            // Check form validity
            const form = document.getElementById('shipping-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Secure Loading State
            completeBtn.disabled = true;
            completeBtn.className = 'w-full py-4 bg-success text-on-primary font-body-lg font-semibold rounded-lg cursor-not-allowed flex items-center justify-center gap-2';
            completeBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                🔒 SECURING TRANSACTION...
            `;

            setTimeout(() => {
                // Save order history details
                const orderedItems = cart.get();
                const orderId = 'ORD-' + Math.floor(100000 + Math.random() * 900000);
                const orderDate = new Date().toLocaleDateString('en-IN', { dateStyle: 'medium' });
                const orderTotal = orderedItems.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.08;
                
                const newOrder = {
                    id: orderId,
                    date: orderDate,
                    items: orderedItems,
                    total: orderTotal
                };
                
                try {
                    const orderHistory = JSON.parse(localStorage.getItem('colack_orders') || '[]');
                    orderHistory.unshift(newOrder);
                    localStorage.setItem('colack_orders', JSON.stringify(orderHistory));
                } catch (e) {
                    console.error("Failed to append order history:", e);
                }

                completeBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ORDER COMPLETED SUCCESSFULLY';
                showToast("Order placed successfully! Thank you for shopping with Colack.", "success");
                cart.clear();
                setTimeout(() => {
                    window.location.href = './orders.html'; // Redirect directly to orders page to view items!
                }, 2000);
            }, 2500);
        };

        // Auto checkout helper
        document.getElementById('auto-checkout-btn').onclick = () => {
            document.getElementById('fname').value = "Aman";
            document.getElementById('lname').value = "Sharma";
            document.getElementById('email').value = "aman.sharma@example.in";
            document.getElementById('address').value = "404, Tech Park High Street";
            document.getElementById('city').value = "Bengaluru";
            document.getElementById('state').value = "Karnataka";
            document.getElementById('zip').value = "560001";
            document.getElementById('card-num').value = "4111 2222 3333 4444";
            document.getElementById('card-exp').value = "12 / 29";
            document.getElementById('card-cvv').value = "123";
            
            showToast("Details filled. Initiating transaction...", "success");
            setTimeout(() => {
                completeBtn.click();
            }, 500);
        };

        initCheckout();
    </script>
</body>
</html>
