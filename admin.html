<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colack Catalog Manager (Admin Portal)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#16a34a',
                        'primary-hover': '#15803d',
                        surface: '#121212',
                        'surface-secondary': '#1e1e1e',
                        border: '#2e2e2e',
                        text: '#e5e5e5',
                        'text-secondary': '#a3a3a3'
                    },
                    fontFamily: {
                        display: ['Sora', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0c0c0c;
            color: #e5e5e5;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: #2e2e2e;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #16a34a;
        }
    </style>
</head>
<body class="font-body antialiased min-h-screen flex flex-col selection:bg-primary/20">

    <!-- Header Navigation -->
    <header class="border-b border-border bg-surface sticky top-0 z-50 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-primary text-3xl">settings_accessibility</span>
                <div>
                    <h1 class="font-display font-bold text-lg tracking-tight">COLACK</h1>
                    <p class="text-[10px] font-semibold uppercase tracking-widest text-primary font-mono">Catalog Manager</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="./index.html" class="flex items-center gap-2 px-4 py-2 border border-border rounded-lg text-sm hover:bg-surface-secondary transition-colors font-medium text-text-secondary hover:text-text">
                    <span class="material-symbols-outlined text-lg">storefront</span>
                    View Storefront
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 w-full flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <!-- Left: Form to Add/Edit Product -->
        <section class="lg:col-span-5 bg-surface p-6 rounded-xl border border-border shadow-2xl relative">
            <h2 class="font-display text-xl font-bold mb-6 text-white flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">add_box</span>
                Add New Product
            </h2>
            <form id="product-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-id">Product ID</label>
                    <input type="text" id="prod-id" placeholder="e.g. prod_12" required class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors font-mono">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-name">Name</label>
                        <input type="text" id="prod-name" placeholder="e.g. Ultra TPU V2" required class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-brand">Brand</label>
                        <input type="text" id="prod-brand" placeholder="e.g. Google" required class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-category">Category</label>
                        <select id="prod-category" class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                            <option value="hardware">Computing Hardware</option>
                            <option value="peripherals">Peripherals</option>
                            <option value="books">Learning &amp; Books</option>
                            <option value="apparel">Apparel &amp; Merch</option>
                            <option value="digital">Digital Assets</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-price">Price (₹)</label>
                        <input type="number" id="prod-price" placeholder="e.g. 12999" required min="1" class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-img">Image URL</label>
                    <input type="url" id="prod-img" placeholder="e.g. https://images.unsplash.com/photo-..." required class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-text-secondary mb-2" for="prod-badge">Badge (Optional)</label>
                    <input type="text" id="prod-badge" placeholder="e.g. Limited Stock" class="w-full bg-surface-secondary border border-border rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-primary transition-colors">
                </div>

                <button type="submit" class="w-full py-4 bg-primary hover:bg-primary-hover text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2 shadow-lg shadow-primary/20 mt-6">
                    <span class="material-symbols-outlined">save</span>
                    Add to Storefront Catalog
                </button>
            </form>
        </section>

        <!-- Right: Current Products Database -->
        <section class="lg:col-span-7 bg-surface p-6 rounded-xl border border-border shadow-2xl flex flex-col justify-between min-h-[500px]">
            <div>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-display text-xl font-bold text-white flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">database</span>
                        Active Catalog (<span id="catalog-count">0</span>)
                    </h2>
                    <button id="btn-restore" class="px-4 py-2 border border-primary/40 hover:border-primary hover:bg-primary/5 rounded-lg text-primary text-xs font-bold transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">restart_alt</span>
                        Restore 11 Original Products
                    </button>
                </div>

                <div class="overflow-x-auto max-h-[500px] overflow-y-auto pr-2">
                    <table class="w-full text-left text-sm text-text">
                        <thead class="border-b border-border text-xs uppercase text-text-secondary tracking-widest bg-surface sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="py-3 px-4">Product</th>
                                <th scope="col" class="py-3 px-4">Category</th>
                                <th scope="col" class="py-3 px-4">Price</th>
                                <th scope="col" class="py-3 px-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="catalog-body" class="divide-y divide-border/60">
                            <!-- Dynamically loaded rows -->
                        </tbody>
                    </table>
                    <div id="empty-state" class="hidden text-center py-20 text-text-secondary">
                        <span class="material-symbols-outlined text-5xl mb-4 text-border">folder_open</span>
                        <p class="text-sm">No products in storefront catalog. Use the form to add some!</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        // List of original 11 products
        const DEFAULT_PRODUCTS = [
            {
                id: 'prod_1',
                name: 'GeForce RTX 4090 Founders Edition',
                brand: 'NVIDIA',
                category: 'hardware',
                price: 149999.00,
                rating: 4.9,
                reviews: 128,
                badge: 'Limited Stock',
                img: 'https://images.unsplash.com/photo-1591488320449-011701bb6704?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_2',
                name: 'Deep Learning (Adaptive Computation)',
                brand: "O'Reilly",
                category: 'books',
                price: 4999.00,
                rating: 4.8,
                reviews: 254,
                badge: 'Best Seller',
                img: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_3',
                name: 'Keychron Q1 Pro Mechanical Keyboard',
                brand: 'Keychron',
                category: 'peripherals',
                price: 12999.00,
                rating: 4.8,
                reviews: 142,
                badge: 'Staff Pick',
                img: 'https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_4',
                name: 'Architecture Oversized Hoodie',
                brand: 'NuPhy',
                category: 'apparel',
                price: 3499.00,
                rating: 4.5,
                reviews: 64,
                badge: 'New',
                img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_5',
                name: 'Air75 V2 Low-Profile Keyboard',
                brand: 'NuPhy',
                category: 'peripherals',
                price: 7999.00,
                rating: 4.6,
                reviews: 45,
                badge: '',
                img: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_6',
                name: 'Coral M.2 Accelerator Dual Edge TPU',
                brand: 'Coral',
                category: 'hardware',
                price: 6499.00,
                rating: 4.9,
                reviews: 22,
                badge: 'Imported',
                img: 'https://images.unsplash.com/photo-1591488320449-011701bb6704?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_7',
                name: 'Studio Desk Mat (Charcoal Leather)',
                brand: 'Colack',
                category: 'peripherals',
                price: 2499.00,
                rating: 4.7,
                reviews: 73,
                badge: 'Premium',
                img: 'https://images.unsplash.com/photo-1632292224971-0d45778b3002?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_8',
                name: 'Artisan Keycap Set (Olive Gasket)',
                brand: 'Keychron',
                category: 'peripherals',
                price: 3999.00,
                rating: 4.8,
                reviews: 95,
                badge: '',
                img: 'https://images.unsplash.com/photo-1601445638532-3c6f6c3aa1d6?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_9',
                name: 'Raspberry Pi 5 - 8GB Desktop Starter Kit',
                brand: 'Raspberry Pi',
                category: 'hardware',
                price: 8999.00,
                rating: 5.0,
                reviews: 312,
                badge: 'Recommended',
                img: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_10',
                name: 'Llama 3 70B Fine-Tuned Weights',
                brand: 'Meta',
                category: 'digital',
                price: 49999.00,
                rating: 4.9,
                reviews: 42,
                badge: 'Hot',
                img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop&q=80'
            },
            {
                id: 'prod_11',
                name: 'CUDA Neural Toolkit License',
                brand: 'NVIDIA',
                category: 'digital',
                price: 29999.00,
                rating: 4.8,
                reviews: 18,
                badge: 'License',
                img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=600&auto=format&fit=crop&q=80'
            }
        ];

        const form = document.getElementById('product-form');
        const listBody = document.getElementById('catalog-body');
        const emptyState = document.getElementById('empty-state');
        const countIndicator = document.getElementById('catalog-count');
        const btnRestore = document.getElementById('btn-restore');

        // Show Toast Notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-lg shadow-2xl border transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto max-w-sm ${
                type === 'error' ? 'bg-red-950/80 border-red-500/50 text-red-200' : 'bg-green-950/80 border-green-500/50 text-green-200'
            }`;
            
            const icon = type === 'error' ? 'error' : 'check_circle';
            toast.innerHTML = `
                <span class="material-symbols-outlined text-xl flex-shrink-0">${icon}</span>
                <p class="text-sm font-medium">${message}</p>
            `;
            container.appendChild(toast);
            
            // Force layout reflow
            toast.offsetHeight;
            
            toast.classList.remove('translate-y-2', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Fetch and render current products list
        async function fetchProducts() {
            try {
                const res = await fetch('/products.json');
                if (!res.ok) throw new Error("Catalog file could not be read.");
                const data = await res.json();
                renderCatalog(data);
            } catch (err) {
                console.error("Error fetching catalog:", err);
                renderCatalog([]);
            }
        }

        function renderCatalog(products) {
            countIndicator.textContent = products.length;
            listBody.innerHTML = '';
            
            if (products.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-surface-secondary/40 transition-colors';
                
                const formattedPrice = new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 0
                }).format(p.price);

                tr.innerHTML = `
                    <td class="py-4 px-4 flex items-center gap-3">
                        <img class="w-10 h-10 object-cover rounded bg-neutral-800" src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1591488320449-011701bb6704?w=100'">
                        <div>
                            <p class="font-semibold text-white truncate max-w-[200px]">${p.name}</p>
                            <p class="text-xs text-text-secondary font-mono">${p.brand} | ${p.id}</p>
                        </div>
                    </td>
                    <td class="py-4 px-4">
                        <span class="px-2.5 py-1 rounded-full text-xs font-mono font-semibold uppercase bg-neutral-800 text-text-secondary border border-border">
                            ${p.category}
                        </span>
                    </td>
                    <td class="py-4 px-4 font-mono font-semibold text-primary">
                        ${formattedPrice}
                    </td>
                    <td class="py-4 px-4 text-right">
                        <button class="btn-delete px-3 py-1.5 hover:bg-red-500/10 text-red-500 rounded border border-red-500/20 hover:border-red-500 transition-all text-xs font-bold" data-id="${p.id}">
                            Delete
                        </button>
                    </td>
                `;

                // Bind delete event
                tr.querySelector('.btn-delete').onclick = async (e) => {
                    const id = e.target.getAttribute('data-id');
                    try {
                        const response = await fetch('/api/delete-product', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id })
                        });
                        
                        if (!response.ok) throw new Error("Delete failed");
                        showToast(`Deleted ${id} from catalog.`);
                        fetchProducts();
                    } catch (error) {
                        showToast("Could not delete product.", "error");
                    }
                };

                listBody.appendChild(tr);
            });
        }

        // Form Submit Action
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const product = {
                id: document.getElementById('prod-id').value.trim(),
                name: document.getElementById('prod-name').value.trim(),
                brand: document.getElementById('prod-brand').value.trim(),
                category: document.getElementById('prod-category').value,
                price: parseFloat(document.getElementById('prod-price').value),
                rating: 5.0,
                reviews: 0,
                badge: document.getElementById('prod-badge').value.trim(),
                img: document.getElementById('prod-img').value.trim()
            };

            try {
                const res = await fetch('/api/add-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });

                if (!res.ok) throw new Error("Save failed");
                showToast(`Product "${product.name}" added successfully.`);
                form.reset();
                fetchProducts();
            } catch (err) {
                showToast("Could not save product to database.", "error");
            }
        };

        // Restore Defaults button
        btnRestore.onclick = async () => {
            if (!confirm("Are you sure you want to restore the catalog to the default 11 original products? This will overwrite the current list.")) return;

            try {
                const res = await fetch('/api/add-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(DEFAULT_PRODUCTS)
                });

                if (!res.ok) throw new Error("Restore failed");
                showToast("11 original products restored successfully.");
                fetchProducts();
            } catch (err) {
                showToast("Could not restore products catalog.", "error");
            }
        };

        // Initial Load
        fetchProducts();
    </script>
</body>
</html>
