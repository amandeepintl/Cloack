<body class="min-h-screen flex flex-col font-body-md text-on-background bg-background">

    <!-- Header Navigation -->
    <header class="w-full h-20 px-margin-mobile md:px-margin-desktop flex justify-between items-center bg-surface border-b border-border-subtle">
        <a href="./index.html" class="font-display text-headline-md text-primary tracking-tight"><img src="https://lh3.googleusercontent.com/aida/AP1WRLuoGNouXqg7NYxuaBd8niLEEGIquvz5cQqIP-vy5t-9mcWjBZgUv6PHAs5Dfk7yyR79PAe5jqU2gZvNt_wCZmOvFXvOFTd3ac8ZtU_3wMhrUDfwBHSMG3ZwWw-QdBz9Ly_XT0llN-W99vXQKy15yjpyHWS8WIVCu_70Y899_ewC5CDhRaNHgeRsAcCIIO6ytrL_rbcxx69YqR7lTtQ-W2IPlrCiLlsgi6EkHkfp4dvOMigpsgvs5Rb7MgtG" alt="Colack" class="h-8 w-auto"></a>
        <div class="hidden md:flex gap-6 items-center">
            <a href="./login.html" class="text-primary font-body-sm font-semibold hover:opacity-80 transition-opacity">Sign In</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <!-- Auth Card -->
        <div class="w-full max-w-[440px] bg-surface rounded-xl border border-border-subtle p-8 shadow-md" id="card-content">
            
            <!-- Header Content -->
            <div class="text-center mb-6">
                <h1 class="font-headline-md text-headline-md text-primary mb-1">Forgot Password?</h1>
                <p class="font-body-sm text-body-sm text-text-secondary">
                    No worries, it happens. Enter your email address and we'll send you a link to reset your password.
                </p>
            </div>

            <form id="forgotPasswordForm" class="space-y-4">
                <!-- Email Input Group -->
                <div class="space-y-1">
                    <label for="email" class="font-body-sm text-body-sm text-text-secondary block px-1">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required class="w-full pl-11 pr-4 py-3 bg-white border border-border-subtle rounded-lg text-body-md focus:ring-primary focus:border-primary">
                    </div>
                </div>
                <!-- Submit Button -->
                <button type="submit" id="reset-submit" class="w-full bg-primary text-white py-4 px-4 rounded-lg font-body-md font-semibold hover:bg-primary-hover transition-colors flex items-center justify-center gap-2 group font-bold">
                    <span>Send Reset Link</span>
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>

            <!-- Navigation Footer -->
            <div class="mt-6 pt-4 border-t border-border-subtle text-center">
                <a href="./login.html" class="inline-flex items-center gap-2 font-body-sm text-body-sm text-primary hover:text-primary-hover transition-colors font-medium">
                    <span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
                    <span>Back to Login</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Dynamic Header State / Sync -->
    <script type="module" src="./brand.js"></script>

    <!-- Firebase Password Reset Script -->
    <script type="module">
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { app, auth } from "./firebase-config.js";
        import { showToast } from "./brand.js";

        const form = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('reset-submit');
        const cardContent = document.getElementById('card-content');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                await sendPasswordResetEmail(auth, email);
                showToast(`Password reset link sent to ${email}`);
                
                // Show Success Screen
                cardContent.innerHTML = `
                    <div class="text-center py-6">
                        <div class="mb-6 flex justify-center">
                            <div class="w-16 h-16 bg-success/10 rounded-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-success text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            </div>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-primary mb-2">Check your email</h2>
                        <p class="font-body-sm text-body-sm text-text-secondary mb-6">
                            We've sent a password reset link to <br><span class="font-semibold text-primary">${email}</span>
                        </p>
                        <button onclick="location.reload()" class="w-full border border-border-subtle py-3 px-4 rounded-lg font-body-md font-semibold text-primary hover:bg-surface-secondary transition-colors">
                            Resend Link
                        </button>
                        <div class="mt-6 pt-4 border-t border-border-subtle">
                             <a href="./login.html" class="inline-flex items-center gap-2 font-body-sm text-body-sm text-primary hover:text-primary-hover transition-colors font-medium">
                                <span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
                                <span>Back to Login</span>
                            </a>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        };
    </script>
</body>
</html>
